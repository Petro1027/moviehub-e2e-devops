name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "docker-compose.yml"
      - ".github/workflows/ci-build-push.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push:
    name: Build and push ${{ matrix.image_name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: moviehub-frontend
            context: ./src/frontend
            dockerfile: ./src/frontend/Dockerfile

          - image_name: moviehub-catalog-api
            context: ./src/backend/MovieHub.CatalogApi
            dockerfile: ./src/backend/MovieHub.CatalogApi/Dockerfile

          - image_name: moviehub-reviews-api
            context: ./src/backend/MovieHub.ReviewsApi
            dockerfile: ./src/backend/MovieHub.ReviewsApi/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}